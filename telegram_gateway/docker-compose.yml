version: '3.8'

services:
  telegram_gateway:
    build: .
    ports:
      - "8000:8000"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_WEBHOOK_SECRET=${TELEGRAM_WEBHOOK_SECRET}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB_NAME=${MONGO_DB_NAME:-telegram_gateway}
      - CONVERSATION_SERVICE_URL=${CONVERSATION_SERVICE_URL}
      - USER_PROFILE_SERVICE_URL=${USER_PROFILE_SERVICE_URL}
      - MATCHING_SERVICE_URL=${MATCHING_SERVICE_URL}
      - NOTIFICATION_SERVICE_URL=${NOTIFICATION_SERVICE_URL}
      - CONVERSATION_TIMEOUT=${CONVERSATION_TIMEOUT:-5}
      - MATCHING_TIMEOUT=${MATCHING_TIMEOUT:-3}
      - NOTIFICATION_TIMEOUT=${NOTIFICATION_TIMEOUT:-3}
      - USER_PROFILE_TIMEOUT=${USER_PROFILE_TIMEOUT:-3}
      - AI_MODEL_ID=${AI_MODEL_ID}
      - AI_MAX_TOKENS=${AI_MAX_TOKENS}
      - AI_TEMPERATURE=${AI_TEMPERATURE:-1.0}
      - AI_TIMEOUT_SECONDS=${AI_TIMEOUT_SECONDS:-1}
      - SESSION_TTL=${SESSION_TTL:-86400}
      - RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-1}
      - RATE_LIMIT_WINDOW=${RATE_LIMIT_WINDOW:-1}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - APP_NAME=${APP_NAME:-Telegram Gateway}
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DB_PATH=/app/data/users.db
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
      - mongodb
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3

  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
  mongo_data:
